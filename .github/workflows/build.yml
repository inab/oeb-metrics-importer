name: build and publish (no new tag required)

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read and validate version
        id: version
        shell: bash
        run: |
          VERSION=$(tr -d '[:space:]' < VERSION)

          echo "Validating version format for $VERSION..."

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: The version '$VERSION' does not follow Semantic Versioning (e.g. 1.0.0)."
            exit 1
          fi

          VERSION="v$VERSION"
          echo "Using image tag: $VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t ghcr.io/${{ github.repository_owner }}/opeb-metrics-importer:${{ steps.version.outputs.version }} \
            -t ghcr.io/${{ github.repository_owner }}/opeb-metrics-importer:latest \
            .

      - name: Push Docker image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/opeb-metrics-importer:${{ steps.version.outputs.version }}
          docker push ghcr.io/${{ github.repository_owner }}/opeb-metrics-importer:latest